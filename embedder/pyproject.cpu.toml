[project]
name = "evidencelens-embedder"
version = "0.1.0"
description = "CPU-only BGE-small gRPC embedder for EvidenceLens (no vLLM/CUDA)"
requires-python = ">=3.12"
# CPU-only deps: same as pyproject.toml MINUS vllm. main.py imports only
# sentence-transformers (+ torch); vllm is never imported, so dropping it and
# the CUDA toolchain is safe. torch resolves to the CPU wheel via the
# --extra-index-url in Dockerfile.cpu.
dependencies = [
    "grpcio>=1.68.0",
    "grpcio-tools>=1.68.0",
    "grpcio-health-checking>=1.68.0",
    "grpcio-reflection>=1.68.0",
    "protobuf>=5.28.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sentence-transformers>=3.3.0",
    "torch>=2.5.0",
    "opentelemetry-sdk>=1.28.0",
    "opentelemetry-instrumentation-grpc>=0.49b0",
    "opentelemetry-exporter-otlp>=1.28.0",
    "structlog>=24.4.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"
